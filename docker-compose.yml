version: '3.8'

services:
  ui:
    build:
      context: ./web_ui
      dockerfile: Dockerfile.dev
    container_name: sparky-ui-dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reloading
      - ./web_ui/src:/app/src:delegated
      - ./web_ui/public:/app/public:delegated
      # Named volume so Linux node_modules survive rebuilds and can be reset with:
      # docker compose down -v && docker volume rm badrobot_ui_node_modules
      - ui_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true  # Enable polling for file changes (needed in Docker)
      - WATCHPACK_POLLING=true
      - FAST_REFRESH=true
      # Browser runs on the host — call the published API port directly (no CRA proxy).
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
    restart: unless-stopped
    networks:
      - sparky-network
    depends_on:
      server:
        condition: service_healthy
    stdin_open: true
    tty: true

  server:
    build:
      context: ./agent
      dockerfile: ../Dockerfile
    container_name: sparky-server
    command: uvicorn servers.chat:app --host 0.0.0.0 --port 8000
    working_dir: /app/agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/agent/src
      - SPARKY_WORKSPACE=${SPARKY_WORKSPACE:-/app}
      - SPARKY_MCP_TOOL_NAME_PREFIX=${SPARKY_MCP_TOOL_NAME_PREFIX:-true}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - AGENT_MODEL=${AGENT_MODEL:-gemini-2.5-flash}
      - SPARKY_SUMMARY_TOKEN_THRESHOLD=${SPARKY_SUMMARY_TOKEN_THRESHOLD:-0.85}
      # Comma-separated UI origins allowed to call the API (empty = localhost:3000 defaults)
      - API_CORS_ORIGINS=${API_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - SPARKY_REFLECT_EVERY=${SPARKY_REFLECT_EVERY:-10}
      - SPARKY_TOKEN_BUDGET_PERCENT=${SPARKY_TOKEN_BUDGET_PERCENT:-0.8}
      - LOG_DIR=/app/agent/logs
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-metamcp_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-m3t4mcp}
      - SPARKY_DB=${SPARKY_DB:-sparky_db}
      - SPARKY_DB_URL=postgresql://${POSTGRES_USER:-metamcp_user}:${POSTGRES_PASSWORD:-m3t4mcp}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${SPARKY_DB:-sparky_db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-secret-key-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
    volumes:
      # Mount source code for live reload
      - ./:/app:delegated
    restart: unless-stopped
    networks:
      - sparky-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
    stop_grace_period: 30s

  # Shared Postgres for Sparky (sparky_db). Volume name must stay postgres_data.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sparky-pg
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metamcp_db}
      POSTGRES_USER: ${POSTGRES_USER:-metamcp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-m3t4mcp}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-9433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./agent/scripts/init-sparky-db.sql:/docker-entrypoint-initdb.d/01-init-sparky-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metamcp_user} -d ${POSTGRES_DB:-metamcp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sparky-network
    stop_grace_period: 30s

networks:
  sparky-network:
    driver: bridge

volumes:
  logs:
    driver: local
  # DO NOT rename or remove — contains sparky_db (and legacy metamcp_db if present)
  postgres_data:
    driver: local
  ui_node_modules:
    driver: local
